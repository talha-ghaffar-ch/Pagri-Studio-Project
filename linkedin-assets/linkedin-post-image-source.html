<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { box-sizing: border-box; }
    body {
      width: 1200px;
      height: 627px;
      margin: 0;
      overflow: hidden;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(135deg, #0a1021 0%, #111b36 45%, #1a2750 100%);
      color: #fff;
      position: relative;
    }
    .glow {
      position: absolute;
      border-radius: 50%;
      filter: blur(55px);
      opacity: .45;
    }
    .g1 { width: 260px; height: 260px; background: #ff6d3f; top: -70px; right: -40px; }
    .g2 { width: 280px; height: 280px; background: #3b82f6; left: -90px; bottom: -100px; }

    .frame {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      padding: 34px;
      display: grid;
      grid-template-columns: 1.03fr 0.97fr;
      gap: 20px;
    }

    .left {
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,.15);
      background: linear-gradient(180deg, rgba(255,255,255,.11), rgba(255,255,255,.05));
      box-shadow: 0 18px 42px rgba(0,0,0,.35);
      padding: 24px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .badge {
      display: inline-block;
      background: #f25c27;
      color: #fff;
      font-weight: 800;
      font-size: 12px;
      letter-spacing: .4px;
      padding: 8px 12px;
      border-radius: 999px;
    }

    h1 {
      margin: 14px 0 8px;
      font-size: 62px;
      line-height: .94;
      letter-spacing: -1px;
      font-weight: 900;
    }

    h1 span { color: #ff8f66; }

    .desc {
      margin: 0;
      color: #d9e3ff;
      font-size: 27px;
      line-height: 1.25;
      max-width: 95%;
    }

    .points {
      margin-top: 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .point {
      padding: 10px 11px;
      border-radius: 11px;
      border: 1px solid rgba(255,255,255,.2);
      background: rgba(255,255,255,.08);
      color: #edf2ff;
      font-size: 13px;
      font-weight: 700;
      text-align: center;
    }

    .foot {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #aab8d8;
      font-size: 14px;
      font-weight: 700;
    }

    .brand { font-size: 24px; font-weight: 900; color: #fff; }
    .brand span { color: #ff8f66; }

    .right {
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,.12);
      background:
        radial-gradient(circle at 75% 8%, rgba(242,92,39,.35), rgba(242,92,39,0) 44%),
        linear-gradient(165deg, #0e1430 0%, #111a34 50%, #0f1630 100%);
      box-shadow: 0 18px 40px rgba(0,0,0,.38);
      position: relative;
      overflow: hidden;
    }

    .r-top {
      position: absolute;
      top: 16px;
      left: 16px;
      display: flex;
      align-items: center;
      z-index: 3;
      font-weight: 800;
      font-size: 12px;
      color: #ffd9cd;
      letter-spacing: .5px;
      text-transform: uppercase;
    }

    .phone {
      position: absolute;
      width: 180px;
      height: 378px;
      border-radius: 27px;
      border: 6px solid #0a1229;
      overflow: hidden;
      box-shadow: 0 16px 30px rgba(0,0,0,.55);
      background: #0a1229;
    }

    .phone img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .p1 { left: 24px; top: 154px; transform: rotate(-13deg); }
    .p2 { left: 154px; top: 95px; z-index: 2; }
    .p3 { left: 286px; top: 154px; transform: rotate(12deg); }

  </style>
</head>
<body>
  <div class="glow g1"></div>
  <div class="glow g2"></div>

  <div class="frame">
    <section class="left">
      <div>
        <span class="badge">NEW PROJECT RELEASE</span>
        <h1>Pagri Studio<br><span>App Public</span></h1>
        <p class="desc">Cross-platform digital agency app designed for growth, conversion, and AI-assisted engagement.</p>
        <div class="points">
          <div class="point">Home + Services UX</div>
          <div class="point">Pagri AI Assistant</div>
          <div class="point">Lead Request Workflow</div>
          <div class="point">PWA + Android Ready</div>
        </div>
      </div>
      <div class="foot">
        <div class="brand">Pagri <span>Studio</span></div>
        <div>React | Vite | Capacitor</div>
      </div>
    </section>

    <section class="right">
      <div class="r-top">
        <div>Real app UI previews</div>
      </div>
      <div class="phone p1"><img src="file:///C:/Users/talha/Desktop/Talha/Pagri-Studio-Project/featured-images/01-home.png" /></div>
      <div class="phone p2"><img src="file:///C:/Users/talha/Desktop/Talha/Pagri-Studio-Project/featured-images/03-pagri-ai.png" /></div>
      <div class="phone p3"><img src="file:///C:/Users/talha/Desktop/Talha/Pagri-Studio-Project/featured-images/05-request.png" /></div>
    </section>
  </div>
</body>
</html>

<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;width:1280px;height:720px;overflow:hidden;
      font-family:"Segoe UI",Arial,sans-serif;
      background:linear-gradient(130deg,#0b1020 0%,#0f1630 50%,#1c2747 100%);
      color:#fff;position:relative;
    }
    .grid{
      display:grid;grid-template-columns: 0.95fr 1.05fr;gap:24px;
      height:100%;padding:38px;
    }
    .left{
      background:linear-gradient(180deg,rgba(255,255,255,.09),rgba(255,255,255,.04));
      border:1px solid rgba(255,255,255,.14);
      border-radius:26px;padding:28px;backdrop-filter: blur(3px);
      box-shadow:0 20px 50px rgba(0,0,0,.35);
      display:flex;flex-direction:column;justify-content:space-between;
    }
    .kicker{display:inline-block;padding:8px 14px;border-radius:999px;background:#f25c27;color:#fff;font-weight:800;font-size:13px;letter-spacing:.3px}
    h1{margin:16px 0 10px;font-size:62px;line-height:.95;letter-spacing:-1px}
    h1 .accent{color:#ff8a5f}
    p{margin:0;color:#d7def2;font-size:21px;line-height:1.35}
    .tags{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:20px}
    .tag{padding:10px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);font-weight:700;font-size:14px;color:#e9edfb;text-align:center}
    .bottom{display:flex;justify-content:space-between;align-items:center;color:#9fb0d9;font-weight:700;font-size:14px}
    .brand{font-size:22px;font-weight:900;color:#fff}
    .brand .accent{color:#ff8a5f}

    .right{position:relative;border-radius:26px;overflow:hidden;
      background:radial-gradient(circle at 20% 10%, rgba(242,92,39,.35), rgba(242,92,39,0) 40%),
                 linear-gradient(160deg,#0f1327 0%,#111932 45%,#0f1630 100%);
      border:1px solid rgba(255,255,255,.1);box-shadow:0 20px 45px rgba(0,0,0,.4);
    }
    .rhead{position:absolute;top:18px;left:20px;right:20px;display:flex;justify-content:space-between;align-items:center;z-index:3}
    .rhead .title{font-size:14px;font-weight:800;letter-spacing:.5px;color:#ffdbcf}
    .rhead .pill{font-size:11px;font-weight:800;padding:7px 11px;border-radius:999px;background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.15);color:#ffd8cb}

    .phone{position:absolute;width:205px;height:430px;border-radius:30px;overflow:hidden;
      border:7px solid #0a1229;box-shadow:0 18px 35px rgba(0,0,0,.55);background:#0a1229}
    .phone img{width:100%;height:100%;object-fit:cover;display:block}
    .a{left:34px;top:148px;transform:rotate(-12deg)}
    .b{left:200px;top:98px;z-index:2;transform:rotate(0deg)}
    .c{left:368px;top:148px;transform:rotate(11deg)}

    .stamp{position:absolute;right:22px;bottom:20px;z-index:3;color:#92a6d5;font-size:12px;font-weight:700}
  </style>
</head>
<body>
  <div class="grid">
    <section class="left">
      <div>
        <span class="kicker">APP UI + DESIGN FEATURE</span>
        <h1>Pagri Studio<br><span class="accent">App Showcase</span></h1>
        <p>Real interface preview highlighting visual style, user flow, and product-ready mobile experience.</p>
        <div class="tags">
          <div class="tag">Home Experience</div>
          <div class="tag">Services UI</div>
          <div class="tag">Pagri AI Chat</div>
          <div class="tag">Lead Request Flow</div>
        </div>
      </div>
      <div class="bottom">
        <div class="brand">Pagri <span class="accent">Studio</span></div>
        <div>React | Vite | Capacitor</div>
      </div>
    </section>

    <section class="right">
      <div class="rhead">
        <div class="title">LIVE APP SCREEN PREVIEWS</div>
        <div class="pill">THUMBNAIL V2</div>
      </div>
      <div class="phone a"><img src="file:///C:/Users/talha/Desktop/Talha/Pagri-Studio-Project/featured-images/02-services.png" /></div>
      <div class="phone b"><img src="file:///C:/Users/talha/Desktop/Talha/Pagri-Studio-Project/featured-images/03-pagri-ai.png" /></div>
      <div class="phone c"><img src="file:///C:/Users/talha/Desktop/Talha/Pagri-Studio-Project/featured-images/05-request.png" /></div>
      <div class="stamp">1280 x 720</div>
    </section>
  </div>
</body>
</html>
